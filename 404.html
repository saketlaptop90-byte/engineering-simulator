    <title>Page Not Found - EngiSim 3D</title>
    <script>
        // Extract the requested path
        const path = window.location.pathname;
        const filename = path.split('/').pop(); // e.g., aerospace_engineering.html
        
        if (filename && filename.endsWith('.html') && filename !== 'index.html' && filename !== 'simulator.html') {
            const category = filename.replace('.html', '');
            window.location.replace('/simulator.html?category=' + category);
        } else {
            window.location.replace('/');
        }
    </script>
