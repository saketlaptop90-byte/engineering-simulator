<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Plans - EngiSim</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background-color: #050b14; color: white; padding-top: 80px; }
    .container { max-width: 1200px; margin: 40px auto; padding: 2rem; text-align: center; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; color: var(--accent); margin-bottom: 1rem; }
    .subtitle { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 3rem; }
    
    .plans-grid { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; margin-bottom: 4rem; }
    .plan-card { background: rgba(12,18,37,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 3rem 2rem; width: 340px; text-align: center; transition: transform 0.3s, border-color 0.3s; position: relative; overflow: hidden; }
    .plan-card:hover { transform: translateY(-10px); border-color: var(--accent); }
    .plan-card.pro { border: 2px solid var(--accent); box-shadow: 0 10px 40px rgba(0,229,255,0.15); }
    .pro-badge { position: absolute; top: 16px; right: -30px; background: var(--accent); color: #000; padding: 5px 40px; transform: rotate(45deg); font-weight: 700; font-size: 0.8rem; }
    
    .plan-name { font-size: 1.8rem; font-family: 'Space Grotesk', sans-serif; margin-bottom: 1rem; }
    .plan-price { font-size: 3rem; font-weight: 800; margin-bottom: 2rem; }
    .plan-price span { font-size: 1.2rem; color: var(--text-muted); font-weight: 400; }
    
    .features-list { list-style: none; padding: 0; margin-bottom: 2rem; text-align: left; }
    .features-list li { margin-bottom: 1rem; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
    .features-list li::before { content: '✓'; color: #10b981; font-weight: bold; }
    
    .btn-buy { width: 100%; padding: 1rem; border-radius: 8px; border: none; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-buy:hover { opacity: 0.9; }
    .btn-buy.free { background: rgba(255,255,255,0.1); color: white; }
    .btn-buy.premium { background: linear-gradient(135deg, #00c8ff, #7c6aff); color: white; }
    
    .coupon-section { background: rgba(12,18,37,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 2rem; max-width: 500px; margin: 0 auto; }
    .coupon-section h3 { margin-bottom: 1rem; }
    .coupon-input-group { display: flex; gap: 10px; }
    .coupon-input-group input { flex: 1; padding: 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; font-size: 1rem; outline: none; }
    .coupon-input-group button { padding: 0 2rem; border-radius: 8px; background: var(--accent); color: #000; border: none; font-weight: 600; cursor: pointer; }
    #coupon-msg { margin-top: 10px; font-size: 0.9rem; }
    
    #loader { font-size: 1.2rem; color: var(--accent); margin-top: 4rem; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="logo"><a href="index.html">EngiSim <span>3D</span></a></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
    </div>
  </nav>

  <div class="container">
    <h1>Supercharge Your Engineering</h1>
    <p class="subtitle">Upgrade to unlock Priority AI Queues and massive chat limits.</p>
    
    <div id="loader">Syncing plans with server...</div>

    <div class="plans-grid" id="plans-container" style="display: none;">
      <!-- Populated by JS -->
    </div>

    <div class="coupon-section" id="coupon-section" style="display: none;">
      <h3>Have a Promo Code?</h3>
      <div class="coupon-input-group">
        <input type="text" id="coupon-input" placeholder="Enter coupon code..." />
        <button id="btn-apply-coupon">Apply</button>
      </div>
      <p id="coupon-msg"></p>
    </div>
  </div>

  <script type="module" src="economy.js"></script>
<script type="module" src="ads.js?v=1783402802.58953"></script>
</body>
</html>
