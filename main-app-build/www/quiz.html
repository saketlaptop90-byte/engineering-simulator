<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Engine - EngiSim</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background-color: #050b14; color: white; padding-top: 80px; }
    .quiz-container { max-width: 800px; margin: 40px auto; padding: 2rem; background: rgba(12,18,37,0.95); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 10px 40px rgba(0,229,255,0.1); }
    .quiz-header { text-align: center; margin-bottom: 2rem; }
    .quiz-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; color: var(--accent); margin-bottom: 0.5rem; }
    .quiz-header p { color: var(--text-muted); font-size: 1.1rem; }
    .progress-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }
    .question-box { font-size: 1.3rem; font-weight: 500; margin-bottom: 1.5rem; }
    .options-grid { display: flex; flex-direction: column; gap: 1rem; }
    .option-btn { padding: 1rem 1.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; font-size: 1.1rem; color: white; text-align: left; transition: all 0.2s ease; }
    .option-btn:hover:not(:disabled) { background: rgba(0,229,255,0.1); border-color: var(--accent); }
    .option-btn.selected { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    .option-btn.correct { background: #10b981; border-color: #10b981; color: white; }
    .option-btn.wrong { background: #ef4444; border-color: #ef4444; color: white; }
    .feedback-box { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; display: none; font-size: 1rem; }
    .feedback-box.correct { background: rgba(16,185,129,0.1); border: 1px solid #10b981; color: #10b981; }
    .feedback-box.wrong { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #ef4444; }
    .actions { display: flex; justify-content: flex-end; margin-top: 2rem; }
    .btn-next { padding: 0.8rem 2rem; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 600; font-size: 1.1rem; cursor: pointer; display: none; }
    .btn-next:hover { opacity: 0.9; }
    .result-screen { text-align: center; display: none; }
    .result-score { font-size: 4rem; font-family: 'Space Grotesk', sans-serif; color: var(--accent); margin: 1rem 0; }
    #loader { text-align: center; padding: 3rem; color: var(--accent); font-size: 1.2rem; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="logo"><a href="index.html">EngiSim <span>3D</span></a></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="profile.html">My Profile</a>
    </div>
  </nav>

  <div class="quiz-container">
    <div id="loader">Loading Quiz Data...</div>

    <div id="quiz-ui" style="display: none;">
      <div class="quiz-header">
        <h1 id="quiz-title">Quiz</h1>
        <p id="quiz-meta">Question <span id="q-current">1</span> of <span id="q-total">?</span></p>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
      
      <div id="quiz-content">
        <div class="question-box" id="question-text"></div>
        <div class="options-grid" id="options-container"></div>
        <div class="feedback-box" id="feedback-box"></div>
      </div>
      
      <div class="actions">
        <button class="btn-next" id="btn-next">Next Question</button>
      </div>
    </div>

    <div id="result-screen" class="result-screen">
      <h1>Quiz Complete!</h1>
      <div class="result-score" id="result-score">0%</div>
      <p style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 2rem;">Marks: <span id="result-marks"></span></p>
      <div style="display: flex; gap: 1rem; justify-content: center;">
        <button onclick="window.location.href='index.html'" style="padding: 0.8rem 2rem; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; cursor: pointer;">Home</button>
        <button onclick="window.location.href='profile.html'" style="padding: 0.8rem 2rem; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight:600; cursor: pointer;">View Profile</button>
      </div>
    </div>
  </div>

  <script type="module" src="quiz.js"></script>
<script type="module" src="ads.js?v=1783402802.60228"></script>
</body>
</html>
