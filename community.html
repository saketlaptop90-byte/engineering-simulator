<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community - Engineering Universe</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.18.3/index.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #050b14;
      color: white;
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      background: rgba(12, 18, 37, 0.95);
      border-bottom: 1px solid rgba(0, 200, 255, 0.2);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 1.4rem; font-weight: 800; font-family: 'Space Grotesk', sans-serif; }
    .logo a { text-decoration: none; color: white; }
    .logo span { color: #00c8ff; }
    .nav-links { display: flex; align-items: center; gap: 16px; }
    .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: color 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: #00c8ff; }
    .hamburger-btn {
      display: none;
      background: none;
      border: 1px solid rgba(0, 200, 255, 0.2);
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 8px;
      line-height: 1;
    }
    .hamburger-btn:hover { background: rgba(255,255,255,0.1); }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
      width: 100%;
      overflow-y: auto;
    }
    
    #sign-in-prompt {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }
    
    #post-composer {
      background: rgba(12, 18, 37, 0.8);
      border: 1px solid rgba(0, 200, 255, 0.2);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      display: none;
      position: relative;
    }
    
    #post-input {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      color: white;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 12px;
      outline: none;
    }
    #post-input:focus {
      border-color: #00c8ff;
    }
    
    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    #btn-emoji-community {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    #btn-emoji-community:hover { opacity: 1; }
    
    #submit-post-btn {
      background: linear-gradient(135deg, #00c8ff, #7c6aff);
      color: white;
      border: none;
      padding: 8px 24px;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    #submit-post-btn:hover { transform: scale(1.05); }
    
    #char-count {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      margin-right: 12px;
    }
    
    #emoji-popover-community {
      position: absolute;
      top: 100%;
      left: 16px;
      z-index: 1000;
      display: none;
      margin-top: 8px;
    }
    
    #feed {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    /* Post Card Styles */
    .post-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      transition: transform 0.2s, background 0.2s;
    }
    .post-card:hover {
      background: rgba(255,255,255,0.05);
      transform: translateY(-2px);
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    .post-author {
      font-weight: 600;
      color: #00c8ff;
    }
    .post-date {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
    }
    .post-content {
      line-height: 1.5;
      font-size: 0.95rem;
      word-wrap: break-word;
    }
    .post-time {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
    }
    .post-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .action-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .action-btn:hover {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .like-btn:hover, .like-btn.liked {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }
    .share-btn:hover {
      background: rgba(0, 200, 255, 0.15);
      border-color: rgba(0, 200, 255, 0.3);
      color: #00c8ff;
    }
    .report-btn:hover {
      background: rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.3);
      color: #f59e0b;
    }
    .delete-btn:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }
    .pin-btn:hover, .pin-btn.pinned {
      background: rgba(16, 185, 129, 0.15);
      border-color: rgba(16, 185, 129, 0.3);
      color: #10b981;
    }
    
    @media (max-width: 768px) {
      .hamburger-btn { display: block; }
      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        right: 0;
        background: rgba(12, 18, 37, 0.98);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 200, 255, 0.2);
        border-radius: 0 0 12px 12px;
        padding: 10px;
        min-width: 200px;
        gap: 4px;
        z-index: 200;
      }
      .nav-links.mobile-open { display: flex; }
      .nav-links a { padding: 8px 12px; border-radius: 6px; }
      .nav-links a:hover { background: rgba(255,255,255,0.05); }
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Engineering Universe 3D Simulator. Explore, analyze, and learn about engineering mechanisms in interactive 3D.">
    <meta name="keywords" content="Engineering, Simulator, 3D Models, Mechanical Engineering, Education, Civil Engineering">
    <meta name="author" content="EngiSim Team">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Engineering Universe 3D">
    <meta property="og:description" content="Explore, analyze, and learn about engineering mechanisms in interactive 3D.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://engineering-universe-72120.web.app/">
    
    <!-- Bing/Google Verification (Optional later, generic for now) -->
    <meta name="robots" content="index, follow">

    
    <meta name="google-adsense-account" content="ca-pub-7318663619327346">
</head>
<body>
  <h1 style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;">Engineering Universe Community & Networking</h1>

  <nav>
    <div class="logo"><a href="index.html">EngiSim <span>3D</span></a></div>
    <button class="hamburger-btn" id="hamburger-btn" aria-label="Toggle menu">☰</button>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Home</a>
      <a href="simulator.html">Simulator</a>
      <a href="community.html" class="active">Community</a>
      <a href="messages.html" id="nav-messages" style="display:none;">Messages</a>
      <a href="quiz.html">Quizzes</a>
      <span id="nav-unauth" style="position: relative;">
        <button id="nav-signin-main" onclick="var d=document.getElementById('signin-dropdown'); if(d){ d.style.display=d.style.display==='none'?'flex':'none'; } event.stopPropagation(); return false;" style="background: linear-gradient(135deg, #00c8ff, #7c6aff); color: white; padding: 8px 18px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer;">Sign In</button>
        <div id="signin-dropdown" style="display: none; z-index: 2000; position: absolute; top: 100%; right: 0; margin-top: 10px; background: rgba(12,18,37,0.95); border: 1px solid rgba(0,200,255,0.2); border-radius: 8px; padding: 10px; flex-direction: column; gap: 10px; min-width: 150px; backdrop-filter: blur(10px);">
           <button id="nav-signin-google" style="background:#fff; color:black; padding:8px 16px; border-radius:4px; font-weight:bold; border:none; cursor:pointer; width:100%;">Google</button>
           <button id="nav-signin-bing" style="background:#0078d4; color:white; padding:8px 16px; border-radius:4px; font-weight:bold; border:none; cursor:pointer; width:100%;">Microsoft</button>
        </div>
      </span>
      <span id="nav-auth" class="user-profile" style="display: none; align-items: center; gap: 10px;">
        <img id="nav-user-pic" src="" alt="User" style="width:32px; height:32px; border-radius:50%;">
        <span id="nav-user-name" style="color:white; font-size:0.85rem;">User</span>
        <button id="nav-signout" style="background:transparent; border:1px solid #ef4444; color:#ef4444; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:0.8rem;">Logout</button>
      </span>
    </div>
  </nav>
  <script>
    document.getElementById('hamburger-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('nav-links').classList.toggle('mobile-open');
    });
    document.addEventListener('click', function(e) {
      var nav = document.getElementById('nav-links');
      if (nav && !e.target.closest('nav')) nav.classList.remove('mobile-open');
    });
  </script>

  <div class="container">
    <div id="sign-in-prompt">
      <h2>Join the Conversation</h2>
      <p style="margin-top: 10px; color: rgba(255,255,255,0.6);">Please sign in to post and interact with the community.</p>
    </div>

    <div id="post-composer">
      <textarea id="post-input" placeholder="Share your thoughts, engineering questions, or cool discoveries..." maxlength="1000"></textarea>
      <div class="composer-actions">
        <div>
          <button id="btn-emoji-community">😀</button>
          <div id="emoji-popover-community">
            <emoji-picker></emoji-picker>
          </div>
        </div>
        <div style="display: flex; align-items: center;">
          <span id="char-count">0/1000</span>
          <button id="submit-post-btn">Post</button>
        </div>
      </div>
    </div>

    <div id="feed">
      <!-- Posts will be injected here by community.js -->
    </div>
  </div>

  <script type="module" src="community.js"></script>
<script type="module" src="ads.js?v=1783402802.57823"></script>
</body>
</html>
